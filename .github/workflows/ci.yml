
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22'
          channel: 'stable'
      - name: Install melos
        run: dart pub global activate melos
      - run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          dart pub get
          melos bootstrap
          melos run analyze
          melos run test

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22'
          channel: 'stable'
      - name: Install melos
        run: dart pub global activate melos
      - run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          dart pub get
          melos bootstrap
          cd app/progressor
          flutter build linux --debug --no-pub
      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-debug
          path: app/progressor/build/linux/x64/debug/bundle/

  # Note: Full Android APK + gh-pages update for Obtainium done in release workflow or manual
  # For PRs we just ensure it analyzes and Linux builds.
