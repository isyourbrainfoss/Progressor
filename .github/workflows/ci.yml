name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - name: Install Linux build deps (for flutter pub get)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Flutter version
        run: flutter --version
      - name: Flutter pub get (app)
        run: |
          cd app/progressor
          flutter pub get
      - name: Analyze
        run: |
          cd app/progressor
          flutter analyze --no-pub --no-fatal-infos --no-fatal-warnings
      - name: Test
        run: |
          cd app/progressor
          flutter test --no-pub

  build-linux:
    runs-on: ubuntu-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Flutter version
        run: flutter --version
      - name: Flutter pub get (app)
        run: |
          cd app/progressor
          flutter pub get
      - name: Build Linux release
        run: |
          cd app/progressor
          flutter build linux --release
      - name: Upload Linux release bundle
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-bundle
          path: app/progressor/build/linux/x64/release/bundle/
          retention-days: 7

  build-android-prepare:
    runs-on: ubuntu-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Flutter version
        run: flutter --version
      - name: Flutter pub get (app)
        run: |
          cd app/progressor
          flutter pub get
      - name: Build Android arm64 APK (prepares for Obtainium / gh-pages)
        run: |
          cd app/progressor
          flutter build apk --release --target-platform android-arm64
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-apk
          path: app/progressor/build/app/outputs/flutter-apk/
          retention-days: 7

  deploy-continuous:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [analyze-test, build-linux, build-android-prepare]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-arm64-apk
          path: apk-artifacts

      - name: Download Linux bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-release-bundle
          path: linux-artifacts

      - name: Prepare Linux bundle for Flatpak script
        run: |
          mkdir -p app/progressor/build/linux/x64/release/bundle
          cp -r linux-artifacts/* app/progressor/build/linux/x64/release/bundle/

      - name: Install Flatpak tools and SDK
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Sdk//48 org.gnome.Platform//48

      - name: Build Flatpak repo
        run: ./flatpak/build-flatpak.sh

      - name: Find and rename APK for consistent asset name
        id: apk
        run: |
          ORIG_APK=$(find apk-artifacts -name '*arm64*.apk' | head -1)
          mv "$ORIG_APK" apk-artifacts/progressor-arm64-v8a.apk
          echo "APK=apk-artifacts/progressor-arm64-v8a.apk" >> $GITHUB_ENV
          echo "APK_BASENAME=progressor-arm64-v8a.apk" >> $GITHUB_ENV

      - name: Generate version.json for Obtainium
        run: |
          ./tool/generate_version_json.sh \
            --apk "${{ env.APK }}" \
            --out version.json \
            --url "https://github.com/isyourbrainfoss/Progressor/releases/download/continuous/${{ env.APK_BASENAME }}" \
            --versionCode 100

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Prepare and commit to gh-pages
        run: |
          cd gh-pages
          git fetch origin gh-pages
          git reset --hard origin/gh-pages
          mkdir -p repo
          cp -r ../repo/* repo/
          cp ../progressor.flatpakrepo . || true
          cp ../version.json .
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy continuous from main ${{ github.sha }}" || echo "No changes"
          git push origin gh-pages || true

      - name: Create or update continuous release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous
          files: |
            ${{ env.APK }}
            progressor.flatpakrepo
          draft: false
          prerelease: true
