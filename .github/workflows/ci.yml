name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - name: Install Linux build deps (for flutter pub get)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Flutter version
        run: flutter --version
      - name: Flutter pub get (app)
        run: |
          cd app/progressor
          flutter pub get
      - name: Analyze
        run: |
          cd app/progressor
          flutter analyze --no-pub --no-fatal-infos --no-fatal-warnings
      - name: Test
        run: |
          cd app/progressor
          flutter test --no-pub

  build-linux:
    runs-on: ubuntu-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Flutter version
        run: flutter --version
      - name: Flutter pub get (app)
        run: |
          cd app/progressor
          flutter pub get
      - name: Build Linux release
        run: |
          cd app/progressor
          flutter build linux --release
      - name: Upload Linux release bundle
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-bundle
          path: app/progressor/build/linux/x64/release/bundle/
          retention-days: 7

  build-android-prepare:
    runs-on: ubuntu-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Flutter version
        run: flutter --version
      - name: Flutter pub get (app)
        run: |
          cd app/progressor
          flutter pub get
      - name: Build Android arm64 APK (prepares for Obtainium / gh-pages)
        run: |
          cd app/progressor
          flutter build apk --release --target-platform android-arm64
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-apk
          path: app/progressor/build/app/outputs/flutter-apk/
          retention-days: 7
