
name: Release & Distribute

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22'
          channel: 'stable'
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          dart pub global activate melos
          melos bootstrap
          cd app/progressor
          flutter build apk --release --no-pub --target-platform android-arm64
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: progressor-arm64-v8a.apk
          path: app/progressor/build/app/outputs/flutter-apk/app-release.apk

  update-obtainium:
    runs-on: ubuntu-latest
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: progressor-arm64-v8a.apk
          path: .
      - name: Prepare version.json
        run: |
          # Simple version.json for Obtainium (update versionCode on real releases)
          VERSION="${GITHUB_REF#refs/tags/v}"
          SHA=$(sha256sum progressor-arm64-v8a.apk | cut -d' ' -f1)
          cat > version.json << EOF
          {
            "name": "Progressor",
            "version": "$VERSION",
            "versionCode": 1,
            "sha256sum": "$SHA",
            "url": "https://github.com/isyourbrainfoss/Progressor/releases/download/${GITHUB_REF#refs/tags/}/progressor-arm64-v8a.apk"
          }
          EOF
      - name: Commit and push to gh-pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add version.json
          git commit -m "chore: update version.json for Obtainium $GITHUB_REF" || echo "No change"
          git push origin gh-pages || true
