
name: Release & Distribute

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          dart pub global activate melos
          melos bootstrap
          cd app/progressor
          flutter build apk --release --no-pub --target-platform android-arm64
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk progressor-arm64-v8a.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: progressor-arm64-v8a.apk
          path: progressor-arm64-v8a.apk

  build-flatpak:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - name: Install Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Install flatpak tools
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Sdk//48 org.gnome.Platform//48
      - name: Build flatpak repo
        run: ./flatpak/build-flatpak.sh
      - name: Upload flatpak repo
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo
      - name: Upload .flatpakrepo
        uses: actions/upload-artifact@v4
        with:
          name: progressor.flatpakrepo
          path: progressor.flatpakrepo

  deploy-gh-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build-android, build-flatpak]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: progressor-arm64-v8a.apk
          path: .
      - name: Prepare version.json
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          SHA=$(sha256sum progressor-arm64-v8a.apk | cut -d' ' -f1)
          cat > version.json << EOF
          {
            "name": "Progressor",
            "version": "$VERSION",
            "versionCode": 1,
            "sha256sum": "$SHA",
            "url": "https://github.com/isyourbrainfoss/Progressor/releases/download/${GITHUB_REF#refs/tags/}/progressor-arm64-v8a.apk"
          }
          EOF
      - name: Download flatpak repo
        uses: actions/download-artifact@v4
        with:
          name: flatpak-repo
          path: flatpak-repo-art
      - name: Download .flatpakrepo
        uses: actions/download-artifact@v4
        with:
          name: progressor.flatpakrepo
          path: .
      - name: Prepare flatpak files
        run: |
          mkdir -p repo
          cp -r flatpak-repo-art/* repo/
      - name: Commit and push to gh-pages
        run: |
          git fetch origin gh-pages
          git reset --hard origin/gh-pages
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add version.json progressor.flatpakrepo repo
          git commit -m "chore: update Obtainium + Flatpak for $GITHUB_REF" || echo "No change"
          git push origin gh-pages || true

  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build-android, build-flatpak]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: progressor-arm64-v8a.apk
          path: .
      - name: Download .flatpakrepo (optional)
        uses: actions/download-artifact@v4
        with:
          name: progressor.flatpakrepo
          path: .
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Progressor ${{ github.ref_name }}"
          files: |
            progressor-arm64-v8a.apk
            progressor.flatpakrepo
          draft: false
          prerelease: false
          generate_release_notes: true
