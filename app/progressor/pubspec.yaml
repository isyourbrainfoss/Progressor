name: progressor
description: Progressor — state-of-the-art adaptive app for Tindeq Progressor 200. Live force, tests, pretty plots, training guidance, gamification, Nextcloud sync.
publish_to: none
version: 0.1.0+1
resolution: workspace

environment:
  sdk: '>=3.10.0-0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_selector: ^1.0.3
  share_plus: ^12.0.0
  url_launcher: ^6.3.1
  flutter_blue_plus: ^2.3.9
  progressor_core:
    path: ../../packages/progressor_core
  progressor_sensors:
    path: ../../packages/progressor_sensors
  progressor_charts:
    path: ../../packages/progressor_charts
  wakelock_plus: ^1.5.0
  path_provider: ^2.1.5
  path: ^1.9.1
  meta: ^1.16.0
  uuid: ^4.5.1
  collection: ^1.18.0
  intl: ^0.19.0
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift: ^2.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/demo_pull.jsonl
    - assets/minimal_pull.json
