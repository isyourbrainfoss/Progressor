app-id: com.isyourbrainfoss.Progressor
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: progressor
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --system-talk-name=org.freedesktop.UPower  # optional for battery
  # BlueZ BLE for Tindeq Progressor on Linux
  - --system-talk-name=org.bluez
  - --talk-name=org.bluez
  - --allow=bluetooth
modules:
  - name: progressor
    buildsystem: simple
    build-commands:
      - install -D progressor /app/bin/progressor
      - mkdir -p /app/bin/lib
      - cp -r bundle/lib/* /app/bin/lib/
      - mkdir -p /app/bin/data
      - cp -r bundle/data/* /app/bin/data/
      - install -D com.isyourbrainfoss.Progressor.desktop /app/share/applications/com.isyourbrainfoss.Progressor.desktop
      - install -D com.isyourbrainfoss.Progressor.metainfo.xml /app/share/metainfo/com.isyourbrainfoss.Progressor.metainfo.xml
      - install -D icon.png /app/share/icons/hicolor/512x512/apps/com.isyourbrainfoss.Progressor.png
    sources:
      - type: dir
        path: .
# See tool/ and build-flatpak.sh for full bundle build
